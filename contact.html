<body>
<nav class="navbar navbar-expand-lg flipper-navbar">
    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">
            <img class="logo me-2" src="img/page_downloads_graphics_logo_black.png" alt="Forum-Logo">
            FLIPPER-FORUM

        <div class="navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">GŁÓWNA</a></li>

            </ul>
        </div>

<div class="container mt-4 content-area">
    <h1 class="text-center">Zgłoś błąd</h1>

    <form id="contactForm" class="mt-4 col-md-8 mx-auto">
        <div class="mb-3">
            <label for="imie" class="form-label text-white">Imię <i>(wymagane)</i></label>
            <input type="text" class="form-control flipper-input" id="imie" required pattern="[A-Za-zżźćńółęąśŻŹĆĄŚĘŁÓŃ0-9\-]+">
        </div>
        <div class="mb-3">
            <label for="nazwisko" class="form-label text-white">Nazwisko <i>(wymagane)</i></label>
            <input type="text" class="form-control flipper-input" id="nazwisko" required pattern="[A-Za-zżźćńółęąśŻŹĆĄŚĘŁÓŃ\-]+">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label text-white">E-mail <i>(wymagane)</i></label>
            <input type="email" class="form-control flipper-input" id="email" required>
        </div>
        <div class="mb-3">
            <label for="telefon" class="form-label text-white">Telefon <i>(wymagane)</i></label>
            <input type="tel" class="form-control flipper-input" id="telefon" pattern="[0-9\s\+]+">
        </div>
        <div class="mb-3">
            <label for="temat" class="form-label text-white">Temat zgłoszenia <i>(wymagane)</i></label>
            <input type="text" class="form-control flipper-input" id="temat" required minlength="5" maxlength="50">
        </div>
        <div class="mb-3">
            <label for="wiadomosc" class="form-label text-white">Wiadomość <i>(wymagane)</i></label>
            <textarea class="form-control flipper-input" id="wiadomosc" rows="5" required minlength="10" maxlength="500"></textarea>
        </div>
        <button type="submit" class="btn flipper-btn w-100 mt-3">> ZGŁOŚ_BŁĄD</button>
    </form>
</div>
<footer class="footer text-center">
    <div class="container-fluid row">
        <div class="col-4 text-start">Uptime: 12d 4h</div>
        <div class="col-4 text-warning fw-bold">© 2026 FLIPPER-FORUM.PL</div>

    </div>

</html>
